<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schedule Manager</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- LOGIN -->
    <div id="login-view">
      <div class="login-card">
        <h2>Schedule Manager</h2>
        <label>Username</label>
        <input type="text" id="login-user" autocomplete="username" />
        <label>Password</label>
        <input
          type="password"
          id="login-pass"
          autocomplete="current-password"
        />
        <div class="login-error" id="login-error"></div>
        <button
          class="btn"
          style="width: 100%; height: 38px; font-size: 14px"
          onclick="doLogin()"
        >
          Sign in
        </button>
      </div>
    </div>

    <!-- APP -->
    <div id="app-view">
      <nav class="navbar">
        <div class="nav-menu"></div>
        <div class="nav-brand">Schedule Manager</div>
        <div class="nav-links">
          <a class="csv-link" href="/api/schedule.csv" target="_blank">↓ CSV</a>
          <button class="btn outline sm" onclick="doLogout()">Logout</button>
        </div>
      </nav>

      <div class="content">
        <div class="selector-bar">
          <select id="canvas-first" onchange="onCanvasFirstChange()">
            <option>Prva godina</option>
            <option>Druga godina</option>
            <option>Treca godina</option>
            <option>Cetvrta godina</option>
            <option>BMI</option>
            <option>TOI</option>
            <option>Profesori</option>
            <option>Prostorije</option>
          </select>
          <select id="canvas-second"></select>
        </div>
        <!-- CANVAS PANEL -->
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">Schedule View</span>
            <div class="panel-actions">
              <button class="btn outline sm" onclick="saveCanvas()">
                Save Image
              </button>
              <button class="btn outline sm" onclick="generateIcs()">
                Export .ics
              </button>
            </div>
          </div>
          <div class="canvas-container">
            <canvas id="scheduleCanvas"></canvas>
          </div>
        </div>

        <div class="selector-bar">
          <select id="table-first" onchange="onTableFirstChange()">
            <option>Prva godina</option>
            <option>Druga godina</option>
            <option>Treca godina</option>
            <option>Cetvrta godina</option>
            <option>BMI</option>
            <option>TOI</option>
            <option>Profesori</option>
            <option>Prostorije</option>
          </select>
          <select id="table-second"></select>
        </div>
        <!-- TABLE PANEL -->
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">Edit Schedule</span>
            <div class="panel-actions">
              <button class="btn sm" onclick="openAddModal()">+ Add Row</button>
              <button
                class="btn outline sm"
                onclick="document.getElementById('csv-import-input').click()"
              >
                ↑ Import CSV
              </button>
              <input
                type="file"
                id="csv-import-input"
                accept=".csv"
                style="display: none"
                onchange="importCSV(this)"
              />
            </div>
          </div>
          <div class="table-toolbar">
            <input
              class="filter-input"
              id="filter-input"
              placeholder="Filter rows…"
              oninput="renderTable()"
            />
            <span class="row-count" id="row-count">0 rows</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th onclick="sortBy('year')">Year</th>
                  <th onclick="sortBy('orientation')">Orient.</th>
                  <th onclick="sortBy('name')">Name</th>
                  <th onclick="sortBy('displayName')">Display Name</th>
                  <th onclick="sortBy('day')">Day</th>
                  <th onclick="sortBy('startTime')">Start</th>
                  <th onclick="sortBy('endTime')">End</th>
                  <th onclick="sortBy('location')">Location</th>
                  <th onclick="sortBy('teacher')">Teacher</th>
                  <th onclick="sortBy('type')">Type</th>
                  <th style="width: 110px">Actions</th>
                </tr>
              </thead>
              <tbody id="table-body"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="status-bar">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Ready</span>
      </div>

      <footer>Schedule Manager</footer>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modal">
      <div class="modal">
        <div class="modal-header">
          <h3 id="modal-title">Add Row</h3>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <div class="modal-grid">
            <div class="field">
              <label>Year</label
              ><input id="f-year" type="number" placeholder="2024" />
            </div>
            <div class="field">
              <label>Orientation</label
              ><input id="f-orientation" type="text" placeholder="e.g. Fall" />
            </div>
            <div class="field full">
              <label>Name</label
              ><input id="f-name" type="text" placeholder="Course name" />
            </div>
            <div class="field full">
              <label>Display Name</label
              ><input
                id="f-displayName"
                type="text"
                placeholder="Short display name"
              />
            </div>
            <div class="field">
              <label>Day</label>
              <select id="f-day">
                <option>Ponedjeljak</option>
                <option>Utorak</option>
                <option>Srijeda</option>
                <option>Četvrtak</option>
                <option>Petak</option>
                <option>Subota</option>
                <option>Nedjelja</option>
              </select>
            </div>
            <div class="field">
              <label>Type</label>
              <select id="f-type">
                <option value="">—</option>
                <option>Predavanje</option>
                <option>LV</option>
                <option>AV</option>
              </select>
            </div>
            <div class="field">
              <label>Start Time</label><input id="f-startTime" type="time" />
            </div>
            <div class="field">
              <label>End Time</label><input id="f-endTime" type="time" />
            </div>
            <div class="field">
              <label>Location</label>
              <select id="f-location">
                <option value="">—</option>
                <option>Room A101</option>
                <option>Room B202</option>
                <option>Room C303</option>
                <option>Auditorium</option>
                <option>Lab 1</option>
                <option>Lab 2</option>
                <option>Online</option>
                <option>Library</option>
              </select>
            </div>
            <div class="field">
              <label>Teacher</label
              ><input
                id="f-teacher"
                type="text"
                placeholder="Instructor name"
              />
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn" onclick="saveModal()">Save Row</button>
            <button class="btn outline" onclick="closeModal()">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
