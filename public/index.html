<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schedule Manager</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- LOGIN -->
    <div id="login-view">
      <div class="login-card">
        <h2>Schedule Manager</h2>
        <label>Username</label>
        <input type="text" id="login-user" autocomplete="username" />
        <label>Password</label>
        <input
          type="password"
          id="login-pass"
          autocomplete="current-password"
        />
        <div class="login-error" id="login-error"></div>
        <button
          class="btn"
          style="width: 100%; height: 38px; font-size: 14px"
          onclick="doLogin()"
        >
          Sign in
        </button>
      </div>
    </div>

    <!-- APP -->
    <div id="app-view">
      <nav class="navbar">
        <div class="nav-menu"></div>
        <div class="nav-brand">Editor rasporeda</div>
        <div class="nav-links">
          <a class="csv-link" href="/api/schedule.csv" target="_blank">↓ CSV</a>
          <button class="btn outline sm" onclick="doLogout()">Logout</button>
        </div>
      </nav>

      <div class="content">
        <div class="selector-bar">
          <select id="canvas-first" onchange="onCanvasFirstChange()">
            <option>Prva godina</option>
            <option>Druga godina</option>
            <option>Treca godina</option>
            <option>Cetvrta godina</option>
            <option>BMI</option>
            <option>TOI</option>
            <option>Predavači</option>
            <option>Prostorije</option>
          </select>
          <select id="canvas-second"></select>
        </div>
        <!-- CANVAS PANEL -->
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">Pregled rasporeda</span>
            <div class="panel-actions">
              <button class="btn outline sm" onclick="saveCanvas()">
                Preuzmi sliku
              </button>
              <button class="btn outline sm" onclick="generateIcs()">
                Export .ics
              </button>
            </div>
          </div>
          <div class="canvas-container">
            <canvas id="scheduleCanvas"></canvas>
          </div>
        </div>

        <div class="selector-bar">
          <select id="table-first" onchange="onTableFirstChange()">
            <option>Prva godina</option>
            <option>Druga godina</option>
            <option>Treca godina</option>
            <option>Cetvrta godina</option>
            <option>BMI</option>
            <option>TOI</option>
            <option>Predavači</option>
            <option>Prostorije</option>
          </select>
          <select id="table-second"></select>
        </div>
        <!-- TABLE PANEL -->
        <div class="panel" style="border-radius: 8px;">
          <div class="panel-header">
            <span class="panel-title">Izmjeni raspored</span>
            <div class="panel-actions">
              <button class="btn outline sm" onclick="openAddModal()">+ Dodaj</button>
              <input
                type="file"
                id="csv-import-input"
                accept=".csv"
                style="display: none"
                onchange="importCSV(this)"
              />
            </div>
          </div>
          <div class="table-toolbar">
            <input
              class="filter-input"
              id="filter-input"
              placeholder="Pretraži"
              oninput="renderTable()"
            />
            <span class="row-count" id="row-count">0 redova</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th onclick="sortBy('year')">Godina</th>
                  <th onclick="sortBy('orientation')">Smjer</th>
                  <th onclick="sortBy('name')">Naziv</th>
                  <th onclick="sortBy('displayName')">Skr.</th>
                  <th onclick="sortBy('day')">Dan</th>
                  <th onclick="sortBy('startTime')">Početak</th>
                  <th onclick="sortBy('endTime')">Kraj</th>
                  <th onclick="sortBy('location')">Prostorija</th>
                  <th onclick="sortBy('teacher')">Predavač</th>
                  <th onclick="sortBy('type')">Tip</th>
                  <th style="width: 110px">Akcije</th>
                </tr>
              </thead>
              <tbody id="table-body"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="status-bar">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Spremno</span>
      </div>

      <footer>github.com/FETuzla</footer>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modal">
      <div class="modal">
        <div class="modal-header">
          <h3 id="modal-title">Dodaj</h3>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <div class="modal-grid">
            <div class="field">
              <label>Godina</label>
              <select id="f-year" onchange="onModalYearChange()">
                <option>Prva godina</option>
                <option>Druga godina</option>
                <option>Treca godina</option>
                <option>Cetvrta godina</option>
                <option>BMI</option>
                <option>TOI</option>
              </select>
            </div>
            <div class="field">
              <label>Smjer</label>
              <select id="f-orientation"></select>
            </div>
            <div class="field full">
              <label>Naziv</label
              ><input id="f-name" type="text" placeholder="Naziv predmeta" />
            </div>
            <div class="field full">
              <label>Skračenica</label
              ><input
                id="f-displayName"
                type="text"
                placeholder="Skračenica koja će se prikazivati"
              />
            </div>
            <div class="field">
              <label>Dan</label>
              <select id="f-day">
                <option>Ponedjeljak</option>
                <option>Utorak</option>
                <option>Srijeda</option>
                <option>Četvrtak</option>
                <option>Petak</option>
                <option>Subota</option>
                <option>Nedjelja</option>
              </select>
            </div>
            <div class="field">
              <label>Tip</label>
              <select id="f-type">
                <option>Predavanje</option>
                <option>LV</option>
                <option>AV</option>
              </select>
            </div>
            <div class="field">
              <label>Početak</label><input id="f-startTime" type="text" placeholder="08:00" pattern="[0-9]{2}:[0-9]{2}" />
            </div>
            <div class="field">
              <label>Kraj</label><input id="f-endTime" type="text" placeholder="10:00" pattern="[0-9]{2}:[0-9]{2}" />
            </div>
            <div class="field">
              <label>Prostorija</label>
              <select id="f-location">
                <option>A2</option>
                <option>BIT</option>
                <option>FF 008</option>
                <option>FTOS</option>
                <option>G RC 12</option>
                <option>G RC 19</option>
                <option>G RC 21</option>
                <option>G RC 9</option>
                <option>GA</option>
                <option>GIM MM</option>
                <option>GLabEM</option>
                <option>GLabOE</option>
                <option>SSQ Lab</option>
                <option>Stelekt</option>
                <option>Stelekt Lab</option>
                <option>Tehn.Fak</option>
              </select>
            </div>
            <div class="field">
              <label>Predavač</label
              ><input
                id="f-teacher"
                type="text"
                placeholder="Ime predavača"
              />
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn" onclick="saveModal()">Dodaj</button>
            <button class="btn outline" onclick="closeModal()">Odustani</button>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
